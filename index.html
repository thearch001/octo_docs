<script>
$.base64.utf8decode = true
let HASH_SEP = "--"
window.indexes = {
	'eng': 'Index',
	'rus': 'Оглавление',
}
function switchLang(lang)
{
	loadArticle(lang, window.current_article)
	$(".index").each(function(i, elem){ $(elem).text(window.indexes[lang]) })
}

function loadArticle(lang, name)
{
	if(window.rows[lang][name] == undefined)
	{
		alert(name)
		name = 'index'
	}

	window.language = lang
	window.current_article = name
	location.hash = window.language + HASH_SEP + window.current_article

	let title = window.rows[lang][name][0]
	let body = $.base64.atob(window.rows[lang][name][1])
	
	if(title != "index"){
		$('#dtitle').html(title)
		$('.indexButt').show()
	}else{
		if(lang == 'rus')
			title = 'Документация'
		else
			title = 'Documentation'
		
		$('#dtitle').html(title)
		$('.indexButt').hide()
	}
	
	$('#dbody').html(body)
	document.body.scrollTop = document.documentElement.scrollTop = 0;
}

$(document).ready(function(){

	if(location.hash != "")
	{
		let ps = location.hash.replace('#','').split(HASH_SEP)
		window.language = ps[0]
		window.current_article = ps[1]
	}else{
		window.language = 'eng'
		window.current_article = 'index'
	}
	
	switchLang(window.language)
})

</script>
